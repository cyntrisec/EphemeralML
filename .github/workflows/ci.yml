name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo clippy --workspace --features mock -- -D warnings
      - run: cargo clippy --no-default-features --features gcp -p ephemeral-ml-enclave -- -D warnings
      - run: cargo clippy --no-default-features --features gcp -p ephemeral-ml-client -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo test --workspace --features mock
      - run: cargo test --no-default-features --features gcp -p ephemeral-ml-enclave

  mock-gate:
    name: Mock gate (no mock in default build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-gate-${{ hashFiles('**/Cargo.lock') }}
      - name: Verify default build has no mock
        run: |
          # Build client with default features (should have NO mock)
          cargo build --release -p ephemeral-ml-client 2>&1
          # Verify --allow-mock flag is NOT available
          if cargo run --release -p ephemeral-ml-client --bin ephemeralml-verify -- --help 2>&1 | grep -q -- '--allow-mock'; then
            echo "FAIL: --allow-mock is available in default build (mock feature leaked)"
            exit 1
          fi
          echo "PASS: --allow-mock not available in default build"
      - name: Verify mock build works when explicit
        run: |
          cargo build --release --features mock -p ephemeral-ml-client 2>&1
          if cargo run --release --features mock -p ephemeral-ml-client --bin ephemeralml-verify -- --help 2>&1 | grep -q -- '--allow-mock'; then
            echo "PASS: --allow-mock available in mock build"
          else
            echo "FAIL: --allow-mock should be available in mock build"
            exit 1
          fi

  build-gcp:
    name: Build (GCP Production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-gcp-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --no-default-features --features gcp -p ephemeral-ml-enclave

  build-aws-prod:
    name: Build (AWS Nitro Production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-aws-prod-${{ hashFiles('**/Cargo.lock') }}
      - name: Check enclave production build
        run: cargo check --no-default-features --features production -p ephemeral-ml-enclave
      - name: Check host production build
        run: cargo check --no-default-features --features production -p ephemeral-ml-host

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-smoke-${{ hashFiles('**/Cargo.lock') }}

      - name: Prepare model
        run: bash scripts/download_model.sh

      - name: Check CLI env vars
        run: |
          cargo run --no-default-features --features gcp -p ephemeral-ml-enclave -- --help 2>&1 | grep -q 'EPHEMERALML_MODEL_SOURCE'
          cargo run --no-default-features --features gcp -p ephemeral-ml-enclave -- --help 2>&1 | grep -q 'EPHEMERALML_GCP_WIP_AUDIENCE'

      - name: Doctor preflight
        run: bash scripts/doctor.sh

      - name: GCS-KMS integration
        run: cargo test --no-default-features --features gcp -p ephemeral-ml-enclave --test gcs_kms_integration

  compliance:
    name: Compliance + Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-compliance-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo test -p ephemeral-ml-compliance
      - run: cargo test --test conformance_test
      - name: AIR v1 vector conformance
        run: cargo test -p ephemeral-ml-common --test air_v1_vectors_test

  deps:
    name: Dependency Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}
      - name: Check duplicate crate count
        run: |
          DUPES=$(cargo tree -d --workspace --depth 0 2>&1 | grep -c "^[a-z]" || true)
          echo "Duplicate crate pairs: $DUPES"
          if [ "$DUPES" -gt 85 ]; then
            echo "::error::Duplicate crate count ($DUPES) exceeds threshold (85). Run 'cargo tree -d --workspace' to identify new duplicates."
            exit 1
          fi

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2023-0071: rsa 0.9.10 Marvin timing attack (CVSS 5.9).
          # No upstream patch available. Mitigated via decrypt_blinded() in
          # enclave/src/attestation.rs and enclave/src/mock.rs.
          # Tracking: https://github.com/RustCrypto/RSA/issues/19
          # TODO(security): Re-evaluate on 2026-05-21 or when rsa 0.10 ships.
          #
          # RUSTSEC-2026-0098 / RUSTSEC-2026-0099: rustls-webpki name-constraint
          # validation bugs. The direct reqwest/rustls 0.23 path is updated in
          # Cargo.lock to rustls-webpki 0.103.12. The remaining vulnerable
          # rustls-webpki 0.101.7 instance is still pulled by the current AWS
          # smithy runtime via aws-smithy-runtime tls-rustls ->
          # aws-smithy-http-client legacy-rustls-ring -> hyper-rustls 0.24.
          # This path is upstream-managed and not removed by a normal workspace
          # dependency refresh.
          #
          # Risk note: both advisories require successful chain validation and a
          # misissued certificate with exploitable name constraints.
          # TODO(security): Remove these ignores once the AWS SDK drops the
          # legacy hyper 0.14 rustls path; re-evaluate by 2026-05-15 even if
          # upstream has not moved yet.
          ignore: RUSTSEC-2023-0071,RUSTSEC-2026-0098,RUSTSEC-2026-0099

  shell-lint:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Syntax check
        run: |
          bash -n scripts/lib/ui.sh scripts/gcp/*.sh
          if compgen -G "scripts/security/*.sh" > /dev/null; then
            bash -n scripts/security/*.sh
          fi
      - name: ShellCheck (ui.sh)
        run: shellcheck scripts/lib/ui.sh
      - name: ShellCheck (security scripts)
        run: |
          if compgen -G "scripts/security/*.sh" > /dev/null; then
            shellcheck scripts/security/*.sh
          fi
      - name: ShellCheck (gcp scripts, advisory)
        run: shellcheck scripts/gcp/*.sh || true
      - name: Deploy metadata regression test
        run: bash scripts/test_deploy_metadata.sh

  release-gate:
    name: Release Gate (GCP)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/release/')
    needs: [fmt, clippy, test, build-gcp, smoke, compliance, mock-gate]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
      - name: Prepare model
        run: bash scripts/download_model.sh
      - name: Run release gate
        run: bash scripts/gcp/release_gate.sh
